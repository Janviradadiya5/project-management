services:
  # PostgreSQL Database Service
  db:
    image: postgres:16-alpine
    container_name: api-db
    environment:
      POSTGRES_DB: ${DB_NAME:-app}
      POSTGRES_USER: ${DB_USER:-app}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-app}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-app} -d ${DB_NAME:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Optional Redis Cache Service
  redis:
    image: redis:7-alpine
    container_name: api-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-redis_password}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_password}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - app-network

  # Django Web Application Service
  web:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: api-web
    environment:
      - DEBUG=${DEBUG:-False}
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - ALLOWED_HOSTS=${ALLOWED_HOSTS:-localhost,127.0.0.1}
      - DB_NAME=${DB_NAME:-app}
      - DB_USER=${DB_USER:-app}
      - DB_PASSWORD=${DB_PASSWORD:-app}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - DB_CONN_MAX_AGE=${DB_CONN_MAX_AGE:-60}
      - DB_ATOMIC_REQUESTS=${DB_ATOMIC_REQUESTS:-True}
      - DB_CONNECT_TIMEOUT=${DB_CONNECT_TIMEOUT:-10}
      - REDIS_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/0
      - ENVIRONMENT=${ENVIRONMENT:-development}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
    ports:
      - "8000:8000"
    volumes:
      - ..:/app
      - static_data:/app/staticfiles
      - media_data:/app/media
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - app-network
    env_file:
      - ../.env

  # Nginx Reverse Proxy Service
  nginx:
    image: nginx:1.27-alpine
    container_name: api-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - static_data:/app/staticfiles:ro
      - media_data:/app/media:ro
    depends_on:
      - web
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://127.0.0.1/health/"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - app-network

  # Optional: Celery Worker for async tasks
  celery_worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: api-celery-worker
    command: celery -A config worker -l info --concurrency=2
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/2
      - DEBUG=${DEBUG:-False}
      - DB_NAME=${DB_NAME:-app}
      - DB_USER=${DB_USER:-app}
      - DB_PASSWORD=${DB_PASSWORD:-app}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - DB_CONN_MAX_AGE=${DB_CONN_MAX_AGE:-60}
      - DB_ATOMIC_REQUESTS=${DB_ATOMIC_REQUESTS:-True}
      - DB_CONNECT_TIMEOUT=${DB_CONNECT_TIMEOUT:-10}
    volumes:
      - ..:/app
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - app-network
    profiles: ["with-celery"]

  # Optional: Celery Beat for scheduled tasks
  celery_beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: api-celery-beat
    command: celery -A config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      - CELERY_BROKER_URL=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/1
      - CELERY_RESULT_BACKEND=redis://:${REDIS_PASSWORD:-redis_password}@redis:6379/2
      - DEBUG=${DEBUG:-False}
      - DB_NAME=${DB_NAME:-app}
      - DB_USER=${DB_USER:-app}
      - DB_PASSWORD=${DB_PASSWORD:-app}
      - DB_HOST=db
      - DB_PORT=5432
      - DB_SSLMODE=${DB_SSLMODE:-disable}
      - DB_CONN_MAX_AGE=${DB_CONN_MAX_AGE:-60}
      - DB_ATOMIC_REQUESTS=${DB_ATOMIC_REQUESTS:-True}
      - DB_CONNECT_TIMEOUT=${DB_CONNECT_TIMEOUT:-10}
    volumes:
      - ..:/app
      - logs_data:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      web:
        condition: service_started
    networks:
      - app-network
    profiles: ["with-celery"]

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  static_data:
    driver: local
  media_data:
    driver: local
  logs_data:
    driver: local

networks:
  app-network:
    driver: bridge

