        description: 1-based page number.
      - in: query
        name: search
        schema:
          type: string
        description: Case-insensitive search term.
      - in: query
        name: sort_by
        schema:
          type: string
          enum:
          - created_at
          - is_read
        description: Field used for sorting.
      - in: query
        name: type
        schema:
          type: string
        description: Filter by notification type.
      tags:
