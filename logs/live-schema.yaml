openapi: 3.0.3
info:
  title: Project Management API
  version: 1.0.0
  description: OpenAPI schema and interactive API documentation.
paths:
  /api/v1/activity-logs/:
    get:
      operationId: activity_logs_list
      summary: List organization activity logs
      parameters:
      - in: header
        name: X-Organization-ID
        schema:
          type: string
          format: uuid
        description: Organization UUID used to scope the request.
        required: true
      - in: query
        name: actor_user_id
        schema:
          type: string
          format: uuid
        description: Filter by actor user UUID.
      - in: query
        name: event_type
        schema:
          type: string
        description: Filter by event type.
      - in: query
        name: fields
        schema:
          type: string
        description: Comma-separated list of response fields to include, or 'all'.
      - in: query
        name: limit
        schema:
          type: integer
        description: 'Items per page. Allowed range: 1-100.'
      - in: query
        name: order
        schema:
          type: string
          enum:
          - asc
          - desc
        description: Sort direction.
      - in: query
        name: page
        schema:
          type: integer
        description: 1-based page number.
      - in: query
        name: search
        schema:
          type: string
        description: Case-insensitive search term.
      - in: query
        name: sort_by
        schema:
          type: string
          enum:
          - created_at
          - event_type
          - target_type
        description: Field used for sorting.
      - in: query
        name: target_type
        schema:
          type: string
        description: Filter by target type.
      tags:
      - Activity Logs
      security:
      - jwtAuth: []
      responses:
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ActivityLogListResponse'
          description: ''
  /api/v1/attachments/{id}:
    delete:
      operationId: attachments_delete
      summary: Soft-delete an attachment
      parameters:
      - in: header
        name: X-Organization-ID
        schema:
          type: string
          format: uuid
        description: Organization UUID used to scope the request.
        required: true
      - in: path
        name: id
