[pytest]
DJANGO_SETTINGS_MODULE = config.settings
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = --cov=apps --cov-report=html --cov-report=term-missing --cov-fail-under=80 -v --tb=short --strict-markers -p no:warnings
markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks tests as integration tests (require DB)
    permission: marks tests as permission-related
    idempotency: marks tests as idempotency/concurrency tests
    negative: marks tests as negative/error handling tests
    auth: marks tests as authentication tests
testpaths = tests apps
norecursedirs = .git .tox dist build *.egg

